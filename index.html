<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PillCount</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.15);
    --green-glow: rgba(63,185,80,0.3);
    --amber: #d29922;
    --red: #f85149;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #3d444d;
    --surface: rgba(22,27,34,0.92);
    --border: rgba(255,255,255,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex; flex-direction: column;
    max-width: 480px; margin: 0 auto;
    position: relative;
  }

  /* ── Full screen camera ── */
  #video {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ── Top bar ── */
  .topbar {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }
  .app-name {
    font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.3px;
  }
  .app-name span { color: var(--green); }
  .model-chip {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text2); padding: 4px 10px;
    background: rgba(0,0,0,0.5); border: 1px solid var(--border);
    border-radius: 20px; backdrop-filter: blur(8px);
  }
  .model-chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); transition: all 0.4s;
  }
  .model-chip.ready .dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .model-chip.loading .dot { background: var(--amber); animation: blink 0.8s infinite; }
  .model-chip.error .dot { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Scan frame corners ── */
  .frame {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1; pointer-events: none;
  }
  .frame-box {
    width: min(80vw, 320px); aspect-ratio: 1;
    position: relative;
  }
  .c { position: absolute; width: 28px; height: 28px; border-color: rgba(255,255,255,0.6); border-style: solid; }
  .c.tl { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .c.tr { top: 0; right: 0; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .c.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .c.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
  .scan-line {
    position: absolute; left: 4px; right: 4px; height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0;
  }
  .scan-line.active { opacity: 0.9; animation: sweep 1.8s ease-in-out infinite; }
  @keyframes sweep { 0%{top:4px} 100%{top:calc(100% - 4px)} }

  /* ── Bbox canvas ── */
  #bbox-canvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 2; pointer-events: none;
  }

  /* ── Loading overlay ── */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  .loading-overlay.hidden { display: none; }
  .loading-pill {
    width: 56px; height: 32px; border-radius: 16px;
    border: 2px solid var(--green);
    position: relative; overflow: hidden;
  }
  .loading-pill::before {
    content: ''; position: absolute;
    left: 50%; top: 0; bottom: 0; width: 2px; background: var(--green); opacity: 0.5;
  }
  .loading-pill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--green-dim), transparent);
    animation: shimmer 1.2s ease-in-out infinite alternate;
  }
  @keyframes shimmer { from{opacity:0.3} to{opacity:1} }
  .loading-text { color: var(--text); font-size: 15px; font-weight: 500; }
  .loading-sub { color: var(--text2); font-size: 12px; font-family: 'DM Mono', monospace; }
  .loading-bar-wrap {
    width: 200px; height: 3px;
    background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .loading-bar { height: 100%; width: 0%; background: var(--green); border-radius: 2px; transition: width 0.4s; }

  /* ── Bottom controls ── */
  .bottom {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    padding: 20px 24px 36px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 60%, transparent);
    z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .hint-text {
    font-size: 12px; color: rgba(255,255,255,0.5);
    font-family: 'DM Mono', monospace; text-align: center;
  }
  .scan-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--green); border: 3px solid rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 0 var(--green-glow);
    position: relative;
  }
  .scan-btn:active { transform: scale(0.93); }
  .scan-btn.ready { animation: pulse-ring 2s ease-out infinite; }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 var(--green-glow); }
    70% { box-shadow: 0 0 0 16px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .scan-btn svg { width: 30px; height: 30px; fill: #fff; }
  .scan-btn:disabled { opacity: 0.4; animation: none; cursor: not-allowed; }
  .history-btn {
    position: fixed; bottom: 44px; right: 24px;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: 1px solid var(--border);
    backdrop-filter: blur(8px); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 11;
  }
  .history-btn svg { width: 18px; height: 18px; fill: var(--text2); }

  /* ── Result sheet ── */
  .result-sheet {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 480px;
    background: #0d1117;
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 30;
    padding: 20px 24px 40px;
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  }
  .result-sheet.open { transform: translateX(-50%) translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--text3); margin: 0 auto 20px;
  }
  .count-row {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px;
  }
  .count-big {
    font-size: 72px; font-weight: 600; font-family: 'DM Mono', monospace;
    color: var(--green); line-height: 1;
  }
  .count-label { font-size: 16px; color: var(--text2); }
  .conf-row {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: var(--text2); margin-bottom: 20px;
  }
  .conf-row span { color: var(--green); }

  /* Drug input */
  .drug-wrap {
    display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
  }
  .drug-input {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; padding: 12px 14px; outline: none;
    transition: border-color 0.2s;
  }
  .drug-input:focus { border-color: var(--green); }
  .drug-input::placeholder { color: var(--text3); }
  .save-btn {
    padding: 12px 20px; border-radius: 10px;
    background: var(--green-dim); border: 1px solid var(--green);
    color: var(--green); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .save-btn:active { transform: scale(0.97); }
  .dismiss-btn {
    width: 100%; padding: 13px;
    background: none; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text2);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .dismiss-btn:active { background: rgba(255,255,255,0.05); }

  /* ── History drawer ── */
  .history-drawer {
    position: fixed; inset: 0;
    background: #0d1117; z-index: 40;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    display: flex; flex-direction: column;
    max-width: 480px; left: 50%; margin-left: -240px;
  }
  .history-drawer.open { transform: translateX(0); }
  @media (max-width: 480px) {
    .history-drawer { left: 0; margin-left: 0; }
  }
  .drawer-header {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .drawer-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .drawer-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: none;
    color: var(--text2); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .history-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .h-drug { font-size: 15px; font-weight: 500; color: var(--text); }
  .h-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; }
  .h-count { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--green); }
  .empty-state { text-align: center; color: var(--text3); font-size: 14px; padding: 48px 0; }
  .clear-row {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: center;
  }
  .clear-btn {
    font-size: 12px; color: var(--red); background: none; border: none;
    font-family: 'DM Mono', monospace; cursor: pointer; padding: 8px 16px;
    border-radius: 8px; border: 1px solid rgba(248,81,73,0.2);
  }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(22,27,34,0.95); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 9px 18px;
    border-radius: 20px; z-index: 50; opacity: 0; transition: opacity 0.25s;
    white-space: nowrap; pointer-events: none; backdrop-filter: blur(12px);
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- Full screen camera -->
<video id="video" autoplay playsinline muted></video>
<canvas id="bbox-canvas"></canvas>

<!-- Scan frame -->
<div class="frame">
  <div class="frame-box">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="scan-line" id="scanLine"></div>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="app-name">Pill<span>Count</span></div>
  <div class="model-chip loading" id="modelChip"><div class="dot"></div><span id="chipText">loading…</span></div>
</div>

<!-- Bottom controls -->
<div class="bottom">
  <div class="hint-text" id="hintText">Loading model…</div>
  <button class="scan-btn" id="scanBtn" onclick="captureAndCount()" disabled>
    <svg viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M23 5h-6v6h6V5zm-6 8h1.5v1.5H17V13zm1.5 1.5H20V16h-1.5v-1.5zM20 13h1.5v1.5H20V13zm-3 3h1.5v1.5H17V16zm1.5 1.5H20V19h-1.5v-1.5zM20 16h1.5v1.5H20V16zm1.5 1.5H23V19h-1.5v-1.5zM23 13h-1.5v1.5H23V13zm0 4.5h-1.5V19H23v-1.5z"/></svg>
  </button>
</div>

<!-- History button -->
<button class="history-btn" onclick="openHistory()">
  <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7v3l4-4-4-4v3zm1 10h-2V8h2v4l2.28 1.36-1 1.72L14 13z"/></svg>
</button>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-pill"></div>
  <div class="loading-text">Loading AI model</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
  <div class="loading-sub" id="loadingSub">Fetching from HuggingFace…</div>
</div>

<!-- Result sheet -->
<div class="result-sheet" id="resultSheet">
  <div class="sheet-handle"></div>
  <div class="count-row">
    <div class="count-big" id="countBig">0</div>
    <div class="count-label">pills detected</div>
  </div>
  <div class="conf-row">avg confidence <span id="confSpan">—</span></div>
  <div class="drug-wrap">
    <input type="text" class="drug-input" id="drugName" placeholder="Drug name (optional)">
    <button class="save-btn" onclick="saveRecord()">Save</button>
  </div>
  <button class="dismiss-btn" onclick="closeSheet()">Scan again</button>
</div>

<!-- History drawer -->
<div class="history-drawer" id="historyDrawer">
  <div class="drawer-header">
    <span class="drawer-title">History</span>
    <button class="drawer-close" onclick="closeHistory()">×</button>
  </div>
  <div class="drawer-body" id="historyBody"></div>
  <div class="clear-row">
    <button class="clear-btn" onclick="clearHistory()">Clear all records</button>
  </div>
</div>

<canvas id="snap-canvas" style="display:none"></canvas>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────
const MODEL_URL = 'https://huggingface.co/DiamondLiao/pillcount/resolve/main/best_model.onnx';
const CLASS_LABELS = ['tablet', 'capsule'];
const CONF_THRESHOLD = 0.45;
const IOU_THRESHOLD  = 0.45;
const INPUT_SIZE = 640;
ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';

// ── State ─────────────────────────────────────────────────────────────────
let session = null;
let lastResult = null;
let history = JSON.parse(localStorage.getItem('pc_history') || '[]');

// ── Boot: camera + model in parallel ─────────────────────────────────────
(async () => {
  startCamera();
  await loadModel();
})();

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    toast('Camera access denied', 'error');
  }
}

async function loadModel() {
  try {
    const res = await fetch(MODEL_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const total = parseInt(res.headers.get('content-length') || '0');
    const reader = res.body.getReader();
    const chunks = []; let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value); received += value.length;
      if (total) {
        const pct = Math.round((received / total) * 85);
        document.getElementById('loadingBar').style.width = pct + '%';
        document.getElementById('loadingSub').textContent = Math.round(received/1024/1024) + ' MB / ' + Math.round(total/1024/1024) + ' MB';
      }
    }
    document.getElementById('loadingSub').textContent = 'Initializing…';
    document.getElementById('loadingBar').style.width = '92%';
    const buf = new Uint8Array(received);
    let pos = 0; for (const c of chunks) { buf.set(c, pos); pos += c.length; }
    session = await ort.InferenceSession.create(buf.buffer, {
      executionProviders: ['wasm'], graphOptimizationLevel: 'all'
    });
    document.getElementById('loadingBar').style.width = '100%';
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('scanBtn').disabled = false;
      document.getElementById('scanBtn').classList.add('ready');
      document.getElementById('hintText').textContent = 'Point at pills and tap';
      setChip('ready', 'ready');
    }, 500);
  } catch(e) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('hintText').textContent = 'Model failed to load';
    setChip('error', 'error');
    toast('Model error: ' + e.message, 'error');
    console.error(e);
  }
}

// ── Capture & count ────────────────────────────────────────────────────────
async function captureAndCount() {
  if (!session) return;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.classList.remove('ready');
  document.getElementById('scanLine').classList.add('active');
  document.getElementById('hintText').textContent = 'Counting…';
  setChip('loading', 'counting');
  clearBbox();

  try {
    const video = document.getElementById('video');
    const snap = document.getElementById('snap-canvas');
    snap.width = INPUT_SIZE; snap.height = INPUT_SIZE;
    const ctx = snap.getContext('2d');
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.min(INPUT_SIZE/vw, INPUT_SIZE/vh);
    const sw = vw*scale, sh = vh*scale;
    const ox = (INPUT_SIZE-sw)/2, oy = (INPUT_SIZE-sh)/2;
    ctx.fillStyle='#000'; ctx.fillRect(0,0,INPUT_SIZE,INPUT_SIZE);
    ctx.drawImage(video, ox, oy, sw, sh);

    const px = ctx.getImageData(0,0,INPUT_SIZE,INPUT_SIZE).data;
    const t = new Float32Array(3*INPUT_SIZE*INPUT_SIZE);
    for (let i=0;i<INPUT_SIZE*INPUT_SIZE;i++) {
      t[i]=px[i*4]/255; t[INPUT_SIZE*INPUT_SIZE+i]=px[i*4+1]/255; t[2*INPUT_SIZE*INPUT_SIZE+i]=px[i*4+2]/255;
    }
    // Model requires batch=8; fill slot 0 with our image, rest zeros
    const batch = new Float32Array(8 * 3 * INPUT_SIZE * INPUT_SIZE);
    batch.set(t, 0);
    const feed = { 'images': new ort.Tensor('float32', batch, [8, 3, INPUT_SIZE, INPUT_SIZE]) };
    const out = (await session.run(feed))['output0'];
    const dets = nms(parse(out.data, out.dims));

    const total = dets.length;
    const avgConf = total ? dets.reduce((s,d)=>s+d.conf,0)/total : 0;
    drawBoxes(dets, video);

    document.getElementById('countBig').textContent = total;
    document.getElementById('confSpan').textContent = total ? (avgConf*100).toFixed(1)+'%' : '—';
    document.getElementById('drugName').value = '';
    lastResult = { total, avgConf, timestamp: new Date().toISOString() };
    document.getElementById('resultSheet').classList.add('open');
    setChip('ready', 'ready');

  } catch(e) {
    toast('Error: ' + e.message, 'error');
    setChip('error', 'error');
    console.error(e);
  }

  document.getElementById('scanLine').classList.remove('active');
  btn.disabled = false; btn.classList.add('ready');
  document.getElementById('hintText').textContent = 'Point at pills and tap';
}

// ── Parser + NMS ──────────────────────────────────────────────────────────
function parse(data, shape) {
  const dets=[];
  // Output shape: [8, 6, 8400] — take first batch only
  // First batch starts at index 0, size = 6*8400
  const batchSize = shape[1] * shape[2]; // 6 * 8400
  const nb = shape[2]; // 8400 boxes
  const st = shape[1]; // 6 = 4 coords + 2 classes
  for(let i=0;i<nb;i++){
    const cx=data[i], cy=data[nb+i], w=data[2*nb+i], h=data[3*nb+i];
    let mc=0, cls=0;
    for(let c=4;c<st;c++){const v=data[c*nb+i];if(v>mc){mc=v;cls=c-4;}}
    if(mc>=CONF_THRESHOLD)dets.push({cx,cy,w,h,conf:mc,cls});
  }
  return dets;
}
function iou(a,b){
  const ax1=a.cx-a.w/2,ay1=a.cy-a.h/2,ax2=a.cx+a.w/2,ay2=a.cy+a.h/2;
  const bx1=b.cx-b.w/2,by1=b.cy-b.h/2,bx2=b.cx+b.w/2,by2=b.cy+b.h/2;
  const ix=Math.max(0,Math.min(ax2,bx2)-Math.max(ax1,bx1));
  const iy=Math.max(0,Math.min(ay2,by2)-Math.max(ay1,by1));
  return ix*iy/(a.w*a.h+b.w*b.h-ix*iy);
}
function nms(dets){
  dets.sort((a,b)=>b.conf-a.conf);
  const keep=[],sup=new Set();
  for(let i=0;i<dets.length;i++){if(sup.has(i))continue;keep.push(dets[i]);for(let j=i+1;j<dets.length;j++){if(!sup.has(j)&&iou(dets[i],dets[j])>IOU_THRESHOLD)sup.add(j);}}
  return keep;
}

// ── Draw boxes ────────────────────────────────────────────────────────────
const COLORS=['#3fb950','#d29922','#58a6ff','#f85149'];
function drawBoxes(dets, video) {
  const c=document.getElementById('bbox-canvas');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const vw=video.videoWidth,vh=video.videoHeight;
  const scale=Math.max(c.width/vw,c.height/vh);
  const rw=vw*scale,rh=vh*scale;
  const rx=(c.width-rw)/2,ry=(c.height-rh)/2;
  const sx=rw/INPUT_SIZE,sy=rh/INPUT_SIZE;
  dets.forEach(d=>{
    const x1=(d.cx-d.w/2)*sx+rx,y1=(d.cy-d.h/2)*sy+ry,bw=d.w*sx,bh=d.h*sy;
    const color=COLORS[d.cls%COLORS.length];
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(x1,y1,bw,bh);
    const label=(CLASS_LABELS[d.cls]||'cls'+d.cls)+' '+(d.conf*100).toFixed(0)+'%';
    ctx.fillStyle=color+'dd';ctx.fillRect(x1,y1-20,ctx.measureText(label).width+10,20);
    ctx.fillStyle='#000';ctx.font='500 11px DM Mono,monospace';ctx.fillText(label,x1+5,y1-6);
  });
}
function clearBbox(){const c=document.getElementById('bbox-canvas');c.getContext('2d').clearRect(0,0,c.width,c.height);}

// ── Sheet ─────────────────────────────────────────────────────────────────
function closeSheet(){
  document.getElementById('resultSheet').classList.remove('open');
  clearBbox();
}

// ── History ───────────────────────────────────────────────────────────────
function saveRecord(){
  if(!lastResult)return;
  const drug=document.getElementById('drugName').value.trim()||'Unnamed';
  history.unshift({drug,...lastResult});
  if(history.length>100)history.pop();
  localStorage.setItem('pc_history',JSON.stringify(history));
  closeSheet();
  toast('Saved — '+drug+' · '+lastResult.total+' units','success');
}
function openHistory(){renderHistory();document.getElementById('historyDrawer').classList.add('open');}
function closeHistory(){document.getElementById('historyDrawer').classList.remove('open');}
function clearHistory(){history=[];localStorage.removeItem('pc_history');renderHistory();}
function renderHistory(){
  const el=document.getElementById('historyBody');
  if(!history.length){el.innerHTML='<div class="empty-state">No records yet</div>';return;}
  el.innerHTML=history.slice(0,50).map(h=>{
    const d=new Date(h.timestamp);
    const label=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return`<div class="history-item"><div><div class="h-drug">${h.drug}</div><div class="h-meta">${label}</div></div><div class="h-count">${h.total}</div></div>`;
  }).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────
function setChip(cls,text){
  const c=document.getElementById('modelChip');
  c.className='model-chip '+cls;
  document.getElementById('chipText').textContent=text;
}
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.className='toast',2600);
}
</script>
